<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SWARM Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css?v=2" />
  </head>
  <body>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <main class="auth-shell">
      <nav class="top-nav" aria-label="Primary">
        <a class="brand" href="/">SWARM</a>
        <div class="nav-links">
          <a href="/">Login</a>
          <a href="/signup">Sign up</a>
        </div>
      </nav>

      <section class="auth-card">
        <p class="eyebrow">Enterprise Copilot</p>
        <h1>Login</h1>
        <p class="subtitle">Enter your credentials to continue into your role workspace.</p>

        <form class="auth-form" id="loginForm">
          <label>
            Email
            <input id="email" name="email" type="email" autocomplete="email" />
          </label>
          <label>
            Password
            <input id="password" name="password" type="password" autocomplete="current-password" />
          </label>
          <button class="send" id="loginBtn" type="button">Login</button>
        </form>

        <div class="auth-footer">
          <p class="muted" id="authStatus">Login to continue.</p>
          <a class="text-link" href="/signup">Create an account</a>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
