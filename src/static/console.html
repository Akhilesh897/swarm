<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SWARM AI Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css?v=5" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="app-body">
  <div class="ambient-glow"></div>
  <div class="ambient-glow-secondary"></div>

  <div class="app-layout">

    <!-- Dynamic Island for RBAC -->
    <div id="dynamicIsland" class="dynamic-island">
      <div class="island-header">
        <div class="identity-pill" id="identityPill">Checking...</div>
      </div>
      <div class="island-details" id="islandDetails">
        <form id="chatForm" class="stealth-form">
          <div class="form-row">
            <label>User ID <input id="userId" name="userId" type="text" autocomplete="off" readonly /></label>
            <label>Role <input id="role" name="role" type="text" autocomplete="off" readonly /></label>
          </div>
          <div class="form-row">
            <label>Session ID <input id="sessionId" name="sessionId" type="text" autocomplete="off" /></label>
            <label>Model
              <select id="modelSelect" name="modelSelect">
                <option value="auto" selected>Auto</option>
                <option value="gemini">Gemini</option>
                <option value="grok">Grok</option>
              </select>
            </label>
          </div>
        </form>
      </div>
    </div>

    <!-- Slim Nav -->
    <nav class="slim-nav">
      <div class="nav-top">
        <div class="brand-orb">SWARM</div>
        <button class="nav-btn active" title="Chat" aria-label="Chat">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
        </button>
      </div>
      <div class="nav-bottom">
        <button class="nav-btn" id="logoutBtn" title="Logout" type="button">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </nav>

    <!-- Side Context Panel -->
    <aside class="side-context">
      <div class="side-header">
        <div class="workspace-identity">
          <h1 id="workspaceTitle">SWARM</h1>
          <p id="roleEyebrow">Intelligent Assistant</p>
        </div>
        <div class="api-status">
          <div class="status-pulse"></div>
          <span id="apiStatus">Checking...</span>
        </div>
        <div class="workspace-controls">
          <button class="tiny-btn" id="refreshContextBtn" type="button">Refresh</button>
          <label class="tiny-toggle">
            <input id="autoRefreshToggle" type="checkbox" checked />
            <span>Auto</span>
          </label>
          <span class="tiny-meta" id="lastSync">--</span>
        </div>
        <div class="kpi-strip" id="kpiStrip"></div>
      </div>

      <div class="context-scroll">


        <div class="context-group">
          <h2>Dashboard</h2>
          <div id="roleMenu" class="role-menu"></div>
          <div id="roleView" class="role-view">Loading...</div>
        </div>

        <div class="context-group">
          <h2>Active Leaves</h2>
          <div id="leavesContainer" class="data-stack">Loading...</div>
        </div>

        <div class="context-group">
          <h2>Open Tickets</h2>
          <div id="ticketsContainer" class="data-stack">Loading...</div>
        </div>

        <div class="context-group">
          <h2>Asset Requests</h2>
          <div id="assetsContainer" class="data-stack">Loading...</div>
        </div>
      </div>
    </aside>

    <!-- Main Chat Interface -->
    <main class="chat-interface">
      <header class="chat-top-bar">
        <div class="chat-title">Live Assistant</div>
        <button class="ghost-btn" id="clearChat" type="button">Clear history</button>
      </header>

      <div class="chat-viewport">
        <div class="chat-log" id="chatLog"></div>
      </div>

      <div class="composer-island">
        <div class="prompt-strip" id="promptStrip"></div>
        <div class="floating-composer">
          <textarea id="message" rows="1" placeholder="Message Copilot..."></textarea>
          <div class="composer-toolbar">
            <span class="word-count" id="draftSignal">Ready</span>
            <button class="send-orb" id="sendBtn" type="button" aria-label="Send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>

  </div>
  <div id="appToast" class="app-toast" aria-live="polite"></div>
  <script src="/static/console.js?v=3"></script>
</body>

</html>
